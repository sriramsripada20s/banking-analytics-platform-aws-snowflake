version: 2
models:
  - name: int_customer_activity_summary
    description: >
      One row per customer — account, transaction, and support case
      activity rolled up, with derived engagement/risk features ready
      for churn modeling and BI.
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: customer_status
        tests:
          - not_null
          - accepted_values:
              values: ['ACTIVE', 'DORMANT', 'CLOSED']
      - name: risk_rating
        tests:
          - accepted_values:
              values: ['LOW', 'MEDIUM', 'HIGH']
      - name: total_accounts
        tests:
          - not_null
      - name: total_balance
        tests:
          - not_null
      - name: transaction_count_all_time
        tests:
          - not_null
      - name: engagement_segment
        tests:
          - not_null
          - accepted_values:
              values: ['NEVER_TRANSACTED', 'ACTIVE', 'AT_RISK', 'DORMANT']
      - name: has_risk_flag
        tests:
          - not_null