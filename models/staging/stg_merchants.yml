version: 2

models:
  - name: stg_merchants
    description: One row per merchant, deduplicated to the most recent version.
    columns:
      - name: merchant_id
        tests:
          - unique
          - not_null

      - name: merchant_name
        tests:
          - not_null

      - name: risk_category
        tests:
          - not_null
          - accepted_values:
              values: ['LOW', 'MEDIUM', 'HIGH']

      - name: industry
        tests:
          - not_null