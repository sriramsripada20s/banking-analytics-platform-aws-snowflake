version: 2

models:
  - name: stg_accounts_current
    description: >
      Live account state, derived directly from the raw account_activity
      event log (ROW_NUMBER, latest updated_at wins). The earlier
      Stream+Task CDC pipeline into CORE.ACCOUNTS_CURRENT was retired;
      this model now computes "current state" itself on every dbt run.
    columns:
      - name: account_id
        description: Primary key
        tests:
          - unique
          - not_null

      - name: account_status
        tests:
          - not_null
          - accepted_values:
              values: ['OPEN', 'FROZEN', 'CLOSED']

      - name: current_balance
        tests:
          - not_null

      - name: currency
        tests:
          - accepted_values:
              values: ['USD']
