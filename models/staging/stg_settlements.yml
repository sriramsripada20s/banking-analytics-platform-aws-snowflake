version: 2

models:
  - name: stg_settlements
    description: >
      One row per settlement transaction. This is an EVENT/FACT table —
      no deduplication by natural key, since every row represents a
      distinct transaction, not a versioned entity.
    columns:
      - name: settlement_id
        tests:
          - unique
          - not_null

      - name: account_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_accounts')
              field: account_id

      - name: merchant_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_merchants')
              field: merchant_id

      - name: amount
        tests:
          - not_null

      - name: settlement_status
        tests:
          - not_null
          - accepted_values:
              values: ['SETTLED', 'PENDING', 'FAILED']