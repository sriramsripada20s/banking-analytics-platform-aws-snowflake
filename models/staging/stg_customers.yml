version: 2

models:
  - name: stg_customers
    description: One row per customer, deduplicated to the most recent version.
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

      - name: customer_status
        tests:
          - not_null
          - accepted_values:
              values: ['ACTIVE', 'DORMANT', 'CLOSED']

      - name: risk_rating
        tests:
          - accepted_values:
              values: ['LOW', 'MEDIUM', 'HIGH']